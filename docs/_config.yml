# --------------------------------------------------------------------------
# Podium Documentation — Jekyll Configuration
# Theme: just-the-docs  https://just-the-docs.com
# --------------------------------------------------------------------------

title: Podium Documentation
description: >-
  A registry for the artifacts AI agents use, and a way to deliver them
  into any harness.
baseurl: "/podium"
url: ""

# --------------------------------------------------------------------------
# Theme
# --------------------------------------------------------------------------
remote_theme: just-the-docs/just-the-docs

color_scheme: nil               # start with light; toggle available below

color_scheme_toggle:
  - light
  - dark

# --------------------------------------------------------------------------
# Search
# --------------------------------------------------------------------------
search_enabled: true
search.heading_level: 3
search.previews: 3
search.preview_words_before: 5
search.preview_words_after: 10
search.tokenizer_separator: /[\s/]+/
search.rel_url: true
search.button: true

# --------------------------------------------------------------------------
# Mermaid Diagrams
# --------------------------------------------------------------------------
mermaid:
  version: "11"

# --------------------------------------------------------------------------
# Navigation
# --------------------------------------------------------------------------
nav_external_links: []

# Top-level sections via per-page nav_order front-matter:
#
#   0  Home
#   1  Getting Started
#   2  Authoring
#   3  Consuming
#   4  Deployment
#   5  Reference
#   6  About

# --------------------------------------------------------------------------
# Aux Links (top-right corner)
# --------------------------------------------------------------------------
aux_links:
  "Podium on GitHub":
    - "https://github.com/lennylabs/podium"

aux_links_new_tab: true

# --------------------------------------------------------------------------
# Footer
# --------------------------------------------------------------------------
footer_content: >-
  Podium is open-source software released under the MIT license.
  Built with <a href="https://just-the-docs.com">just-the-docs</a>.

last_edit_timestamp: true
last_edit_time_format: "%b %e %Y at %I:%M %p"

gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/lennylabs/podium"
gh_edit_source: docs
gh_edit_branch: main
gh_edit_view_mode: "edit"

# --------------------------------------------------------------------------
# Back to Top
# --------------------------------------------------------------------------
back_to_top: true
back_to_top_text: "Back to top"

# --------------------------------------------------------------------------
# Plugins
# --------------------------------------------------------------------------
plugins:
  - jekyll-seo-tag
  - jekyll-remote-theme

# --------------------------------------------------------------------------
# Build settings
# --------------------------------------------------------------------------
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# --------------------------------------------------------------------------
# Excludes
# --------------------------------------------------------------------------
# The four legacy files below are kept in the repo as drafting source for the
# subsequent restructure rounds (deployment/, etc.). They are excluded from
# the site to avoid two competing trees during the transition. Each will be
# rewritten into its new home before the exclude line is removed.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - README.md
  - quickstart.md
  - team-rollout.md
  - operator-guide.md
  - progressive-adoption.md
  - oidc/
