<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" font-family="Helvetica, Arial, sans-serif">
  <!--
    Discovery layers (Map -> Search -> Load).
    Three staged calls, each returning less material than the one
    before. The host advances when it has enough information to
    choose the next narrower scope.
  -->
  <defs>
    <marker id="b-arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M 0 0 L 11 6 L 0 12 z" fill="#1f2933"/>
    </marker>
    <style>
      .b-bg { fill: #ffffff; }
      .b-l1 { fill: #ffe9c7; stroke: #1f2933; stroke-width: 2.4; }
      .b-l2 { fill: #fffaf0; stroke: #1f2933; stroke-width: 2.2; }
      .b-l3 { fill: #d6e9d2; stroke: #1f2933; stroke-width: 2.4; }
      .b-title { font-size: 22px; fill: #1f2933; }
      .b-section { font-size: 14px; fill: #b56b1f; letter-spacing: 0.04em; }
      .b-layer-name { font-size: 20px; fill: #1f2933; }
      .b-tool { font-size: 16px; fill: #1f2933; font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; }
      .b-sub { font-size: 15px; fill: #54616e; }
      .b-line { fill: none; stroke: #1f2933; stroke-width: 2.4; stroke-linecap: round; }
      .b-foot { font-size: 13px; fill: #8a7755; }
      .b-annot { font-size: 14px; fill: #54616e; font-style: italic; }
    </style>
  </defs>

  <rect class="b-bg" width="1000" height="580"/>

  <text class="b-title" x="40" y="42">Discovery layers</text>
  <text class="b-sub" x="40" y="64">Each call returns less material than the one before.</text>

  <!-- Layer 1: Map -->
  <rect class="b-l1" x="100" y="92" width="800" height="100" rx="10"/>
  <text class="b-section" x="120" y="118">layer 1 — map</text>
  <text class="b-tool" x="120" y="148">load_domain · search_domains</text>
  <text class="b-sub" x="120" y="172">Returns the catalog map: domains and notable artifacts. No artifact bodies, no resource bytes.</text>

  <path class="b-line" d="M 500 192 L 500 230" marker-end="url(#b-arrow)"/>
  <text class="b-annot" x="515" y="220">host picks a domain</text>

  <!-- Layer 2: Search -->
  <rect class="b-l2" x="200" y="244" width="600" height="100" rx="10"/>
  <text class="b-section" x="220" y="270">layer 2 — search</text>
  <text class="b-tool" x="220" y="300">search_artifacts</text>
  <text class="b-sub" x="220" y="324">Returns ranked (id, summary, score) within the chosen scope.</text>

  <path class="b-line" d="M 500 344 L 500 382" marker-end="url(#b-arrow)"/>
  <text class="b-annot" x="515" y="372">host picks an artifact</text>

  <!-- Layer 3: Load -->
  <rect class="b-l3" x="300" y="396" width="400" height="100" rx="10"/>
  <text class="b-section" x="320" y="422">layer 3 — load</text>
  <text class="b-tool" x="320" y="452">load_artifact</text>
  <text class="b-sub" x="320" y="476">Manifest inline + materialized resources on the host.</text>

  <text class="b-foot" x="40" y="538">Visibility filtering bounds what each layer can reveal. The map and search layers are useful only when artifact</text>
  <text class="b-foot" x="40" y="556">descriptions and domain metadata are well-written; the registry lints for thin descriptions.</text>
</svg>
