# golangci-lint configuration.
# Stage 1 enables a baseline set of stable linters. Stricter checks (the
# spec-citation lint, error-coverage lint) live in the speccov tool and run
# as separate CI steps so the lint config stays minimal.

run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - nolintlint

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/lennylabs/podium

issues:
  exclude-use-default: false
