name: release

# Fires when a vX.Y.Z (or vX.Y.Z-rc.N) tag is pushed. Pre-release tags
# (anything containing a hyphen, e.g. v0.1.0-rc.1) flow through the same
# pipeline; the GitHub Release is marked prerelease automatically.
#
# The release runs the same battery as nightly.yml — Go full sweep,
# both SDK suites, live Postgres + pgvector, live S3 — before any
# binary publishes. Every publish job lists every test job in needs:
# so a single failure blocks every artifact.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push container images to ghcr.io
  id-token: write   # PyPI trusted publishing + npm provenance

jobs:
  # Hard gate: a tag push only releases when the tagged commit is
  # reachable from main or from a release/* branch. Tags created
  # against feature branches or stale forks fail here and the
  # workflow short-circuits before any test or publish job runs.
  #
  # GitHub Actions has no built-in "tag must be on branch X" filter,
  # so the check is a small git ancestry probe.
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # need full history + every release/* branch
      - name: Verify tag commit is on main or release/*
        run: |
          sha='${{ github.sha }}'
          if git merge-base --is-ancestor "${sha}" origin/main; then
            echo "Tag commit ${sha} is reachable from origin/main."
            exit 0
          fi
          for ref in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin/release/*); do
            if git merge-base --is-ancestor "${sha}" "${ref}"; then
              echo "Tag commit ${sha} is reachable from ${ref}."
              exit 0
            fi
          done
          echo "::error::Tag commit ${sha} is not on main or any release/* branch. Tags must come from a release-track branch; see RELEASING.md." >&2
          exit 1

  go:
    name: go full sweep
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
      - run: make tools
      - run: make lint
      - run: make speccov-drift
      - run: make matrix-audit
      - run: make test
      - run: make coverage-budget

  python:
    name: podium-py
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: sdks/podium-py/pyproject.toml
      - working-directory: sdks/podium-py
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest
          pytest

  typescript:
    name: podium-ts
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdks/podium-ts/package.json
      - working-directory: sdks/podium-ts
        run: |
          npm install
          npm test

  postgres:
    name: live postgres + pgvector
    needs: validate-tag
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: podium
          POSTGRES_DB: podium
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: pkg/store live conformance
        env:
          PODIUM_POSTGRES_DSN: postgres://postgres:podium@localhost:5432/podium?sslmode=disable
        run: go test ./pkg/store/... -count=1 -v
      - name: pkg/vector pgvector conformance
        env:
          PODIUM_POSTGRES_DSN: postgres://postgres:podium@localhost:5432/podium?sslmode=disable
        run: go test ./pkg/vector/... -count=1 -v

  s3:
    name: live S3 (MinIO)
    needs: validate-tag
    runs-on: ubuntu-latest
    # Note: MinIO is started from a step rather than via `services:`,
    # because the official minio/minio image needs `server /data` as
    # its command and GitHub Actions' services block doesn't let you
    # set CMD. Postgres stays as a service because its default CMD
    # works out of the box.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Start MinIO
        # Pinned; keep in sync with docker-compose.yml and nightly.yml.
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2024-10-29T16-01-48Z \
            server /data
          for i in $(seq 1 30); do
            if curl -fs http://localhost:9000/minio/health/ready; then
              echo "MinIO ready"
              exit 0
            fi
            echo "Waiting for MinIO ($i/30)..."
            sleep 2
          done
          echo "MinIO did not become ready in time" >&2
          docker logs minio
          exit 1
      - name: Create test bucket
        run: |
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc
          mc alias set local http://localhost:9000 minioadmin minioadmin
          mc mb --ignore-existing local/podium
      - name: pkg/objectstore live S3 conformance
        env:
          PODIUM_S3_ENDPOINT: localhost:9000
          PODIUM_S3_BUCKET: podium
          PODIUM_S3_ACCESS_KEY_ID: minioadmin
          PODIUM_S3_SECRET_ACCESS_KEY: minioadmin
          PODIUM_S3_USE_SSL: "false"
        run: go test ./pkg/objectstore/... -count=1 -v

  # Cross-compile the three binaries for every supported (os, arch).
  # Each combination uploads an artifact named binaries-<os>-<arch>;
  # the release job downloads + merges them.
  #
  # pkg/vector (sqlite-vec) and internal/serverboot (mattn/go-sqlite3)
  # both require CGO, so every target builds with CGO_ENABLED=1. The
  # Linux rows run on ubuntu-latest with a per-target cross-compiler;
  # darwin/arm64 runs on macos-latest with native clang; windows/amd64
  # runs on windows-latest with the runner's bundled mingw-w64 gcc.
  # All non-darwin targets static-link with their respective libc so
  # the resulting binary doesn't depend on a particular system libc
  # at runtime.
  build:
    needs: [go, python, typescript, postgres, s3]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        # Use bash on every runner including windows-latest (Git Bash).
        # Keeps the build step single-source instead of forking into
        # PowerShell for the Windows row.
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: ''
            cc: gcc
            apt: ''
            static: 'true'
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            suffix: ''
            cc: aarch64-linux-gnu-gcc
            # crossbuild-essential-arm64 is the meta-package that
            # pulls in gcc-aarch64-linux-gnu + libc6-dev-arm64-cross
            # + the rest of the headers cgo needs. The plain
            # gcc-aarch64-linux-gnu alone gives you the compiler
            # without the libc dev files.
            apt: crossbuild-essential-arm64
            static: 'true'
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: ''
            cc: clang
            apt: ''
            static: 'false'
          - os: windows-latest
            goos: windows
            goarch: amd64
            suffix: '.exe'
            cc: gcc
            apt: ''
            static: 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install cross-compiler
        if: matrix.apt != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ${{ matrix.apt }}
      - name: Fetch sqlite3.h for Windows CGO
        # sqlite-vec's C source #includes sqlite3.h, which mingw on
        # windows-latest doesn't provide and mattn/go-sqlite3 ships
        # under a renamed file (sqlite3-binding.h). Grab the header
        # from the SQLite amalgamation and point CGO_CFLAGS at it.
        if: matrix.os == 'windows-latest'
        run: |
          set -eu
          mkdir -p "${RUNNER_TEMP}/sqlite"
          curl -sSL https://www.sqlite.org/2024/sqlite-amalgamation-3470000.zip \
            -o "${RUNNER_TEMP}/sqlite.zip"
          unzip -j -o "${RUNNER_TEMP}/sqlite.zip" \
            'sqlite-amalgamation-3470000/sqlite3.h' \
            -d "${RUNNER_TEMP}/sqlite"
          echo "CGO_CFLAGS=-I${RUNNER_TEMP}/sqlite" >> "${GITHUB_ENV}"
      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
          CC: ${{ matrix.cc }}
        run: |
          VERSION='${{ github.ref_name }}'
          COMMIT='${{ github.sha }}'
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          # Linux + Windows static-link with their respective libc so
          # the resulting binary is portable across distros / versions.
          # darwin dynamic-links against system libraries (the platform
          # convention) — Apple's libSystem.dylib is stable across the
          # macOS versions we support.
          if [ '${{ matrix.static }}' = 'true' ]; then
            EXTLDFLAGS='-linkmode external -extldflags "-static"'
          else
            EXTLDFLAGS=''
          fi
          LDFLAGS="-s -w ${EXTLDFLAGS} \
            -X github.com/lennylabs/podium/internal/buildinfo.Version=${VERSION} \
            -X github.com/lennylabs/podium/internal/buildinfo.Commit=${COMMIT:0:7} \
            -X github.com/lennylabs/podium/internal/buildinfo.Date=${DATE}"
          mkdir -p dist
          for cmd in podium podium-server podium-mcp; do
            out="dist/${cmd}-${GOOS}-${GOARCH}${{ matrix.suffix }}"
            echo "building ${out}"
            go build -trimpath -ldflags "${LDFLAGS}" -o "${out}" ./cmd/${cmd}
          done
          ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  # Collect every per-platform artifact and create the GitHub Release.
  release:
    needs: [build, go, python, typescript, postgres, s3]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Extract CHANGELOG section
        id: notes
        run: |
          TAG='${{ github.ref_name }}'
          VERSION=${TAG#v}
          awk -v v="${VERSION}" '
            $0 ~ "^## \\[" v "\\]" { p=1; next }
            p && /^## / { exit }
            p { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG entry for ${VERSION}; falling back to tag name." >&2
            echo "Release ${TAG}" > release-notes.md
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: release-notes.md
          name: ${{ github.ref_name }}
          # Anything with a hyphen in the tag (v0.1.0-rc.1, v0.1.0-beta)
          # is published as a GitHub pre-release.
          prerelease: ${{ contains(github.ref_name, '-') }}

  # Publish podium-py to PyPI. Requires a configured Trusted Publisher
  # at https://pypi.org/manage/account/publishing/ pointing at this
  # repository + this workflow file + the publish-py job. No API token
  # is stored as a secret.
  publish-py:
    needs: [go, python, typescript, postgres, s3]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      # setuptools-scm derives the version from `git describe --tags`.
      # The default shallow clone hides tags, so request a full clone.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheel + sdist
        working-directory: sdks/podium-py
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdks/podium-py/dist

  # Publish @lennylabs/podium-sdk to npm. Requires repo secret NPM_TOKEN (an
  # automation token from https://www.npmjs.com/settings/<user>/tokens
  # with permission to publish the @lennylabs scope).
  publish-ts:
    needs: [go, python, typescript, postgres, s3]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Inject version from tag
        # package.json on main carries a permanent "0.0.0-dev"
        # placeholder; the workflow rewrites it from the git tag
        # before publish. --no-git-tag-version edits the file
        # without creating a commit or tag.
        working-directory: sdks/podium-ts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version --no-git-tag-version "${VERSION}"
      - name: Publish
        working-directory: sdks/podium-ts
        run: |
          npm install
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Build + push multi-arch container images for podium-server.
  # Requires a Dockerfile at repo root.
  container:
    needs: [go, python, typescript, postgres, s3]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - id: dockerfile
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping container build; no Dockerfile at repo root."
          fi
      - if: steps.dockerfile.outputs.exists == 'true'
        uses: docker/setup-qemu-action@v3
      - if: steps.dockerfile.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3
      - if: steps.dockerfile.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - if: steps.dockerfile.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/podium-server:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/podium-server:latest
          build-args: |
            VERSION=${{ github.ref_name }}
