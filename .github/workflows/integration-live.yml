name: integration-live

# Tier 2 (env-gated) integration tests against real upstream
# services: Postgres, MinIO (S3-compatible). Embedding providers
# stay opt-in because they cost money to call.
#
# Tests skip when their PODIUM_* env var is unset, so a workflow
# without secrets configured passes silently. Wire secrets via the
# repo's Settings → Secrets → Actions panel:
#
#   PODIUM_POSTGRES_DSN     Postgres connection string
#   PODIUM_S3_ENDPOINT      S3-compatible endpoint (host:port)
#   PODIUM_S3_BUCKET        bucket name (must already exist)
#   PODIUM_S3_REGION        region (defaults to us-east-1)
#   PODIUM_S3_ACCESS_KEY_ID
#   PODIUM_S3_SECRET_ACCESS_KEY

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'  # nightly at 07:00 UTC

jobs:
  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: podium
          POSTGRES_DB: podium
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run pkg/store live conformance against Postgres
        env:
          PODIUM_POSTGRES_DSN: postgres://postgres:podium@localhost:5432/podium?sslmode=disable
        run: go test ./pkg/store/... -count=1 -v

  s3:
    runs-on: ubuntu-latest
    services:
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_DEFAULT_BUCKETS: podium
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/ready"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run pkg/objectstore live S3 conformance
        env:
          PODIUM_S3_ENDPOINT: localhost:9000
          PODIUM_S3_BUCKET: podium
          PODIUM_S3_ACCESS_KEY_ID: minioadmin
          PODIUM_S3_SECRET_ACCESS_KEY: minioadmin
          PODIUM_S3_USE_SSL: "false"
        run: go test ./pkg/objectstore/... -count=1 -v -run TestS3
