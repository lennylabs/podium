name: nightly

# Full sweep that catches regressions even when PR traffic is quiet.
# Runs lint, the spec / matrix gates, the Go test suite, the SDK
# suites, and the coverage budget all at once. Failure pings the
# maintainers via the standard GitHub Actions failure notification.
#
# Manual trigger (workflow_dispatch) lets a maintainer re-run after
# a flake without waiting for the next scheduled run.

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC every day
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    name: go full sweep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}

      - run: make tools
      - run: make lint
      - run: make speccov-drift
      - run: make matrix-audit
      - run: make test
      - run: make coverage-budget

  python:
    name: podium-py
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: sdks/podium-py/pyproject.toml
      - working-directory: sdks/podium-py
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest
          pytest

  typescript:
    name: podium-ts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdks/podium-ts/package.json
      - working-directory: sdks/podium-ts
        run: |
          npm install
          npm test
