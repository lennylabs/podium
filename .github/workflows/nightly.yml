name: nightly

# Single source of truth for "did everything pass overnight?". Runs
# the full Go + SDK + live-integration battery. Sigstore live tests
# stay manual (real Fulcio + Rekor cost money and pollute the
# transparency log; OPERATIONS.md covers the manual procedure).
#
# Failure pings the maintainers via the standard GitHub Actions
# failure notification. Manual trigger (workflow_dispatch) lets a
# maintainer re-run after a flake without waiting for the next cron.

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC every day
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    name: go full sweep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}

      - run: make tools
      - run: make lint
      - run: make speccov-drift
      - run: make matrix-audit
      - run: make test
      - run: make coverage-budget

  python:
    name: podium-py
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: sdks/podium-py/pyproject.toml
      - working-directory: sdks/podium-py
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest
          pytest

  typescript:
    name: podium-ts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdks/podium-ts/package.json
      - working-directory: sdks/podium-ts
        run: |
          npm install
          npm test

  postgres:
    name: live postgres + pgvector
    runs-on: ubuntu-latest
    services:
      postgres:
        # pgvector/pgvector:pg16 ships Postgres 16 with the `vector`
        # extension preinstalled, so both pkg/store and pkg/vector
        # exercise the same container.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: podium
          POSTGRES_DB: podium
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: pkg/store live conformance
        env:
          PODIUM_POSTGRES_DSN: postgres://postgres:podium@localhost:5432/podium?sslmode=disable
        run: go test ./pkg/store/... -count=1 -v

      - name: pkg/vector pgvector conformance
        env:
          PODIUM_POSTGRES_DSN: postgres://postgres:podium@localhost:5432/podium?sslmode=disable
        run: go test ./pkg/vector/... -count=1 -v

  s3:
    name: live S3 (MinIO)
    runs-on: ubuntu-latest
    # Note: MinIO is started from a step rather than via `services:`,
    # because the official minio/minio image needs `server /data` as
    # its command and GitHub Actions' services block doesn't let you
    # set CMD. Postgres stays as a service because its default CMD
    # works out of the box.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start MinIO
        # Pinned; keep in sync with docker-compose.yml and release.yml.
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2024-10-29T16-01-48Z \
            server /data
          for i in $(seq 1 30); do
            if curl -fs http://localhost:9000/minio/health/ready; then
              echo "MinIO ready"
              exit 0
            fi
            echo "Waiting for MinIO ($i/30)..."
            sleep 2
          done
          echo "MinIO did not become ready in time" >&2
          docker logs minio
          exit 1

      - name: Create test bucket
        run: |
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc
          mc alias set local http://localhost:9000 minioadmin minioadmin
          mc mb --ignore-existing local/podium

      - name: pkg/objectstore live S3 conformance
        env:
          PODIUM_S3_ENDPOINT: localhost:9000
          PODIUM_S3_BUCKET: podium
          PODIUM_S3_ACCESS_KEY_ID: minioadmin
          PODIUM_S3_SECRET_ACCESS_KEY: minioadmin
          PODIUM_S3_USE_SSL: "false"
        run: go test ./pkg/objectstore/... -count=1 -v
