name: spec-coverage

on:
  pull_request:

jobs:
  speccov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - run: make tools
      - name: Spec coverage report
        run: |
          ./bin/speccov report
          ./bin/speccov uncovered || true
          ./bin/speccov drift
