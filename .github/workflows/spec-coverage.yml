name: spec-coverage

on:
  pull_request:

jobs:
  speccov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - run: make tools
      - name: Spec section coverage
        run: |
          ./bin/speccov report
          ./bin/speccov uncovered || true
          ./bin/speccov drift
      - name: Matrix audit
        run: ./bin/matrix audit || true   # advisory until we close the gaps
      - name: Coverage budget
        run: make coverage-budget
