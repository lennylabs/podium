name: test

# Per-PR + per-push CI gate. Runs the Go suite, the SDK suites, and
# uploads coverage. Three jobs run in parallel so a slow Python suite
# doesn't block Go feedback (and vice versa). The full nightly sweep
# adds lint + matrix-audit + coverage-budget; see nightly.yml.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Cache go build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}

      - run: make tools
      - run: make lint
      - run: make speccov-drift
      - name: Test with coverage
        run: |
          go test -count=1 -coverprofile=coverage.out -coverpkg=./... ./...
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          flags: go
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  python:
    name: podium-py
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: sdks/podium-py/pyproject.toml
      - working-directory: sdks/podium-py
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest
          pytest

  typescript:
    name: podium-ts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdks/podium-ts/package.json
      - working-directory: sdks/podium-ts
        run: |
          npm install
          npm test
