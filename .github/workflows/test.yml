name: test

# Per-PR + per-push CI gate. Runs the Go suite, the SDK suites, and
# uploads coverage. Three jobs run in parallel so a slow Python suite
# doesn't block Go feedback (and vice versa). The full nightly sweep
# adds lint + matrix-audit + coverage-budget; see nightly.yml.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  # codecov-action@v5 uses GitHub Actions OIDC to authenticate with
  # the Codecov GitHub App. Without id-token: write, the upload
  # silently falls back to a tokenless rate-limited path and the
  # badge stays empty.
  id-token: write

jobs:
  go:
    name: go
    runs-on: ubuntu-latest
    # Postgres + pgvector and MinIO run alongside the Go suite so the
    # coverage upload reflects the live paths in pkg/store, pkg/vector,
    # and pkg/objectstore. Tests gate on PODIUM_POSTGRES_DSN / PODIUM_S3_*
    # env vars and skip when those are unset, so the same `go test`
    # invocation works locally without the services.
    services:
      postgres:
        # pgvector/pgvector:pg16 ships Postgres 16 with the `vector`
        # extension preinstalled — same image nightly.yml uses.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: podium
          POSTGRES_DB: podium
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Cache go build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}

      - name: Start MinIO
        # MinIO needs `server /data` as its CMD, which GitHub Actions'
        # services block doesn't support — start it via docker run.
        # Pinned; keep in sync with docker-compose.yml and nightly.yml.
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2024-10-29T16-01-48Z \
            server /data
          for i in $(seq 1 30); do
            if curl -fs http://localhost:9000/minio/health/ready; then
              echo "MinIO ready"; exit 0
            fi
            echo "Waiting for MinIO ($i/30)..."; sleep 2
          done
          echo "MinIO did not become ready in time" >&2
          docker logs minio; exit 1

      - name: Create test bucket
        run: |
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc
          mc alias set local http://localhost:9000 minioadmin minioadmin
          mc mb --ignore-existing local/podium

      - run: make tools
      - run: make lint
      - run: make speccov-drift
      - name: Test with coverage
        env:
          PODIUM_POSTGRES_DSN: postgres://postgres:podium@localhost:5432/podium?sslmode=disable
          PODIUM_S3_ENDPOINT: http://localhost:9000
          PODIUM_S3_BUCKET: podium
          PODIUM_S3_ACCESS_KEY_ID: minioadmin
          PODIUM_S3_SECRET_ACCESS_KEY: minioadmin
        run: |
          go test -count=1 -coverprofile=coverage.out -coverpkg=./... ./...
          echo "--- coverage.out (in-process) ---"
          ls -la coverage.out
          echo "lines: $(wc -l < coverage.out)"
          head -1 coverage.out
      - name: Collect e2e subprocess coverage
        # The end-to-end tests drive the real podium binary as a subprocess, so the
        # in-process profile above never records the boot path, configuration
        # validation, or the CLI. Re-run the e2e suite with GOCOVERDIR set: the
        # command harness then builds the binary with -cover (see
        # internal/testharness/cmdharness) and the spawned process writes its
        # coverage into that directory. This is a separate run because the -coverpkg
        # profile above manages its own coverage directory and does not pass
        # GOCOVERDIR through to the spawned binary.
        env:
          PODIUM_POSTGRES_DSN: postgres://postgres:podium@localhost:5432/podium?sslmode=disable
          PODIUM_S3_ENDPOINT: http://localhost:9000
          PODIUM_S3_BUCKET: podium
          PODIUM_S3_ACCESS_KEY_ID: minioadmin
          PODIUM_S3_SECRET_ACCESS_KEY: minioadmin
          GOCOVERDIR: ${{ github.workspace }}/covdata-e2e
        run: |
          mkdir -p "$GOCOVERDIR"
          # The "Test with coverage" step above already gates e2e correctness; this
          # run exists only to collect coverage, so a flake here warns instead of
          # failing the job.
          go test -count=1 ./test/e2e/... || echo "::warning::e2e coverage run reported failures; subprocess coverage may be partial"
          # covdata textfmt needs at least one covmeta file; start from a valid empty
          # profile so the upload still has a well-formed file when no instrumented
          # subprocess ran.
          echo "mode: set" > coverage-e2e.txt
          if ls "$GOCOVERDIR"/covmeta.* >/dev/null 2>&1; then
            go tool covdata textfmt -i="$GOCOVERDIR" -o=coverage-e2e.txt
          fi
          echo "--- coverage-e2e.txt (subprocess) ---"
          echo "lines: $(wc -l < coverage-e2e.txt)"
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          # Codecov merges the two profiles: coverage.out carries the in-process
          # coverage, coverage-e2e.txt adds the spawned-binary lines.
          files: coverage.out,coverage-e2e.txt
          flags: go
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload coverage profiles as workflow artifact
        # Available on the workflow run page for ~7 days so you can
        # download and inspect the raw profiles when the Codecov badge
        # doesn't reflect what you expect.
        uses: actions/upload-artifact@v7
        with:
          name: coverage-go
          path: |
            coverage.out
            coverage-e2e.txt
          retention-days: 7

  python:
    name: podium-py
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: sdks/podium-py/pyproject.toml
      - working-directory: sdks/podium-py
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest
          pytest

  typescript:
    name: podium-ts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdks/podium-ts/package.json
      - working-directory: sdks/podium-ts
        run: |
          npm install
          npm test
