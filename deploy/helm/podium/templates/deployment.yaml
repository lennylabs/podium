apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "podium.fullname" . }}
  labels:
    {{- include "podium.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "podium.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "podium.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: podium-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret }}
          env:
            - name: PODIUM_REGISTRY_STORE
              value: {{ .Values.config.store.type | quote }}
            - name: PODIUM_OBJECT_STORE
              value: {{ .Values.config.objectStore.type | quote }}
            - name: PODIUM_VECTOR_BACKEND
              value: {{ .Values.config.vectorBackend.type | quote }}
            - name: PODIUM_EMBEDDING_PROVIDER
              value: {{ .Values.config.embeddingProvider.type | quote }}
            - name: PODIUM_IDENTITY_PROVIDER
              value: {{ .Values.config.identityProvider.type | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
