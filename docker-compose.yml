# Local services for the live integration suite. Mirrors the service
# containers used in nightly.yml and release.yml so behavior on the
# laptop matches CI.
#
# Usage:
#   docker compose up -d      # start
#   docker compose down       # stop (keeps volumes)
#   docker compose down -v    # stop + wipe data
#
# Or via the Makefile wrappers:
#   make services-up
#   make services-down
#   make services-logs

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: podium-postgres
    environment:
      POSTGRES_USER: podium
      POSTGRES_PASSWORD: podium
      POSTGRES_DB: podium
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U podium -d podium"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    # Official MinIO image. Pinned so a silent upstream change doesn't
    # break tests. Dependabot (.github/dependabot.yml) bumps this on
    # its weekly cycle; update nightly.yml and release.yml together.
    image: minio/minio:RELEASE.2024-10-29T16-01-48Z
    container_name: podium-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console at http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # The official MinIO image doesn't auto-create buckets (the bitnami
  # MINIO_DEFAULT_BUCKETS env var was vendor-specific). This sidecar
  # waits for MinIO to be healthy, then runs `mc mb` to ensure the
  # `podium` bucket exists. It's a one-shot; restart: "no" prevents
  # docker-compose from restarting it after success.
  minio-init:
    image: minio/mc:RELEASE.2024-10-29T15-34-59Z
    container_name: podium-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/podium
        echo "bucket ready"
    restart: "no"

volumes:
  postgres_data:
  minio_data:
